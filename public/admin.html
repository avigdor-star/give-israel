<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Give Israel — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0038B8;
  --blue-deep: #002A8C;
  --blue-pale: #E6EEFB;
  --blue-ghost: #F4F7FE;
  --white: #FFFFFF;
  --ink: #0C1324;
  --ink-60: #4A5578;
  --ink-40: #7B849E;
  --ink-12: #D4D9E6;
  --ink-06: #EBEEF5;
  --ink-03: #F4F6FA;
  --green: #16A34A;
  --green-bg: #E6F9F0;
  --amber: #D97706;
  --amber-bg: #FFF8E6;
  --red: #DC2626;
  --red-bg: #FEF2F2;
  --r: 10px;
  --font: 'Figtree', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: var(--font); background: var(--ink-03); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* NAV */
.nav { background: var(--ink); padding: 0 28px; display: flex; align-items: center; height: 56px; gap: 20px; }
.nav-logo { font-size: 18px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
.nav-logo span { color: #5B94F0; }
.nav-badge { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px; }
.nav-tabs { margin-left: auto; display: flex; gap: 4px; }
.nav-tab { padding: 8px 16px; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; border: none; background: none; cursor: pointer; border-radius: 8px; font-family: var(--font); transition: 0.2s; }
.nav-tab:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
.nav-tab.active { color: var(--white); background: rgba(255,255,255,0.1); }

/* LAYOUT */
.page { max-width: 1200px; margin: 0 auto; padding: 28px; }

/* STATS ROW */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--white); border-radius: var(--r); padding: 18px 20px; border: 1px solid var(--ink-06); }
.stat-label { font-size: 11px; font-weight: 700; color: var(--ink-40); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-val { font-size: 28px; font-weight: 800; color: var(--ink); margin-top: 4px; letter-spacing: -1px; }
.stat-val.blue { color: var(--blue); }
.stat-val.amber { color: var(--amber); }
.stat-val.green { color: var(--green); }

/* PANELS */
.panel { background: var(--white); border-radius: 12px; border: 1px solid var(--ink-06); margin-bottom: 20px; overflow: hidden; }
.panel-head { padding: 18px 22px; border-bottom: 1px solid var(--ink-06); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 16px; font-weight: 700; color: var(--ink); }
.panel-count { font-size: 12px; font-weight: 600; color: var(--ink-40); background: var(--ink-03); padding: 3px 10px; border-radius: 100px; }

/* TABLE */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { text-align: left; font-size: 10px; font-weight: 700; color: var(--ink-40); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 16px; border-bottom: 1px solid var(--ink-06); background: var(--ink-03); }
.tbl td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--ink-06); vertical-align: top; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--blue-ghost); }

.cell-name { font-weight: 700; color: var(--ink); }
.cell-url { color: var(--blue); text-decoration: none; font-size: 12px; word-break: break-all; }
.cell-url:hover { text-decoration: underline; }
.cell-desc { color: var(--ink-60); font-size: 12px; max-width: 280px; line-height: 1.5; }
.cell-date { color: var(--ink-40); font-size: 12px; white-space: nowrap; }
.cell-email { color: var(--ink-60); font-size: 12px; }

/* Status badges */
.status { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.status-pending { background: var(--amber-bg); color: var(--amber); }
.status-approved { background: var(--green-bg); color: var(--green); }
.status-rejected { background: var(--red-bg); color: var(--red); }

/* Action buttons */
.actions { display: flex; gap: 6px; }
.btn-sm { height: 32px; padding: 0 14px; border: none; border-radius: 7px; font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
.btn-approve { background: var(--green); color: var(--white); }
.btn-approve:hover { background: #15803D; }
.btn-reject { background: var(--ink-03); color: var(--ink-40); }
.btn-reject:hover { background: var(--red-bg); color: var(--red); }
.btn-publish { background: var(--blue); color: var(--white); }
.btn-publish:hover { background: var(--blue-deep); }
.btn-edit { background: var(--blue-pale); color: var(--blue); }
.btn-edit:hover { background: var(--blue); color: var(--white); }
.btn-delete { background: var(--red-bg); color: var(--red); }
.btn-delete:hover { background: var(--red); color: var(--white); }
.btn-edit-sub { background: var(--amber-bg); color: var(--amber); }
.btn-edit-sub:hover { background: var(--amber); color: var(--white); }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--white); padding: 12px 24px; border-radius: var(--r); font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== SLIDE-OUT EDIT PANEL ===== */
.panel-overlay {
  position: fixed; inset: 0;
  background: rgba(12,19,36,0.35);
  backdrop-filter: blur(2px);
  z-index: 900;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.panel-overlay.open { opacity: 1; pointer-events: all; }

.slide-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 580px; max-width: 96vw;
  background: var(--white);
  z-index: 910;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.22, 0.68, 0.31, 1.0);
  display: flex; flex-direction: column;
  box-shadow: -12px 0 48px rgba(0,56,184,0.08);
}
.slide-panel.open { transform: translateX(0); }

.sp-header {
  padding: 24px 32px 20px;
  border-bottom: 1px solid var(--ink-06);
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-shrink: 0;
  background: var(--white);
}
.sp-title { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -0.3px; }
.sp-subtitle { font-size: 13px; color: var(--ink-40); margin-top: 2px; font-weight: 500; }
.sp-close {
  width: 36px; height: 36px; border: none; background: var(--ink-03);
  border-radius: 8px; cursor: pointer; font-size: 18px; color: var(--ink-40);
  display: flex; align-items: center; justify-content: center;
  transition: 0.2s; flex-shrink: 0;
}
.sp-close:hover { background: var(--red-bg); color: var(--red); }

.sp-body {
  flex: 1; overflow-y: auto; padding: 28px 32px 32px;
  scrollbar-width: thin; scrollbar-color: var(--ink-12) transparent;
}
.sp-body::-webkit-scrollbar { width: 6px; }
.sp-body::-webkit-scrollbar-thumb { background: var(--ink-12); border-radius: 3px; }

.sp-section {
  margin-bottom: 28px;
}
.sp-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--ink-40); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.sp-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--ink-06);
}
.sp-section-title.hebrew { color: var(--amber); }
.sp-section-title.hebrew::after { background: var(--amber-bg); }

.sp-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
}
.sp-full { margin-bottom: 16px; }

.sp-field label {
  display: block; font-size: 12px; font-weight: 600; color: var(--ink-60);
  margin-bottom: 6px;
}
.sp-field input,
.sp-field select,
.sp-field textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--ink-12); border-radius: 8px;
  font-family: var(--font); font-size: 14px; color: var(--ink);
  background: var(--white); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.sp-field input:focus,
.sp-field select:focus,
.sp-field textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,56,184,0.08);
}
.sp-field textarea {
  resize: vertical; min-height: 100px; line-height: 1.6;
}
.sp-field input::placeholder,
.sp-field textarea::placeholder {
  color: var(--ink-12); font-weight: 400;
}

/* Checkbox row */
.sp-checks {
  display: flex; gap: 20px; flex-wrap: wrap; margin-top: 4px;
}
.sp-check {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.sp-check input[type="checkbox"] {
  width: 20px; height: 20px; accent-color: var(--blue); cursor: pointer;
  border-radius: 4px;
}
.sp-check span {
  font-size: 14px; color: var(--ink-60); font-weight: 600;
}

/* Footer bar */
.sp-footer {
  padding: 18px 32px; border-top: 1px solid var(--ink-06);
  display: flex; gap: 10px; justify-content: flex-end; align-items: center;
  flex-shrink: 0; background: var(--ink-03);
}
.sp-footer .sp-footer-info {
  margin-right: auto; font-size: 12px; color: var(--ink-40); font-weight: 500;
}
.sp-btn {
  height: 42px; padding: 0 22px; border: none; border-radius: 8px;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px;
}
.sp-btn-cancel {
  background: var(--white); color: var(--ink-40); border: 1px solid var(--ink-12);
}
.sp-btn-cancel:hover { background: var(--ink-03); color: var(--ink-60); }
.sp-btn-save {
  background: var(--blue); color: var(--white);
}
.sp-btn-save:hover { background: var(--blue-deep); }
.sp-btn-publish-action {
  background: var(--green); color: var(--white);
}
.sp-btn-publish-action:hover { background: #15803D; }

/* Empty */
.empty-row td { text-align: center; color: var(--ink-40); padding: 40px; font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .page { padding: 16px; }
  .tbl { display: block; overflow-x: auto; }
  .nav-tabs { display: none; }
  .slide-panel { width: 100vw; }
  .sp-row { grid-template-columns: 1fr; }
  .sp-header { padding: 20px 20px 16px; }
  .sp-body { padding: 20px; }
  .sp-footer { padding: 14px 20px; }
}
</style>
</head>
<body>

<!-- Supabase Auth SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- Admin Auth Gate -->
<div id="authGate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--ink-03);">
  <div style="background:var(--white);padding:36px;border-radius:12px;border:1px solid var(--ink-06);width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
    <div style="font-size:20px;font-weight:800;color:var(--ink);margin-bottom:4px;">Give<span style="color:var(--blue);">Israel</span> Admin</div>
    <div style="font-size:12px;color:var(--ink-40);margin-bottom:24px;">Sign in to continue</div>
    <input type="email" id="adminEmail" placeholder="Email" onkeydown="if(event.key==='Enter')document.getElementById('adminPw').focus()" style="width:100%;padding:10px 14px;border:1.5px solid var(--ink-12);border-radius:8px;font-family:var(--font);font-size:14px;outline:none;margin-bottom:10px;">
    <input type="password" id="adminPw" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()" style="width:100%;padding:10px 14px;border:1.5px solid var(--ink-12);border-radius:8px;font-family:var(--font);font-size:14px;outline:none;margin-bottom:12px;">
    <div id="authErr" style="color:var(--red);font-size:12px;font-weight:600;margin-bottom:12px;display:none;"></div>
    <button onclick="adminLogin()" id="loginBtn" style="width:100%;padding:10px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;">Log In</button>
  </div>
</div>
<script>
// Supabase Auth — server-verified authentication
const SUPA_URL='https://psrtcjaxfeutecirypwd.supabase.co';
const SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzcnRjamF4ZmV1dGVjaXJ5cHdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTcxMDIsImV4cCI6MjA4OTUzMzEwMn0.4aJK0277vZudaRtvmCpEhfWhHkbrXyHIc_2f8DgqZkQ';
const sbAuth = supabase.createClient(SUPA_URL, SUPA_ANON);
let authSession = null;

async function adminLogin(){
  const email=document.getElementById('adminEmail').value;
  const pw=document.getElementById('adminPw').value;
  const errEl=document.getElementById('authErr');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';
  btn.disabled=true;btn.textContent='Signing in...';
  const{data,error}=await sbAuth.auth.signInWithPassword({email,password:pw});
  if(error){errEl.textContent=error.message;errEl.style.display='';btn.disabled=false;btn.textContent='Log In';return;}
  authSession=data.session;
  showAdmin();
}

function showAdmin(){
  document.getElementById('authGate').style.display='none';
  document.getElementById('adminContent').style.display='';
}

function adminLogout(){
  sbAuth.auth.signOut();
  authSession=null;
  document.getElementById('adminContent').style.display='none';
  document.getElementById('authGate').style.display='flex';
  document.getElementById('adminEmail').value='';
  document.getElementById('adminPw').value='';
}

// Check for existing session on page load
sbAuth.auth.getSession().then(({data:{session}})=>{
  if(session){authSession=session;showAdmin();}
});
// Keep session fresh
sbAuth.auth.onAuthStateChange((event,session)=>{authSession=session;});
</script>

<div id="adminContent" style="display:none;">
<nav class="nav">
  <div class="nav-logo">Give<span>Israel</span></div>
  <div class="nav-badge">Admin</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('suggestions')">Suggestions</button>
    <button class="nav-tab" onclick="showTab('charities')">All Charities</button>
  </div>
  <button onclick="adminLogout()" style="margin-left:12px;padding:6px 14px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);">Log Out</button>
</nav>

<div class="page">
  <div class="stats" id="statsRow"></div>

  <!-- SUGGESTIONS TAB -->
  <div id="tab-suggestions">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Pending Suggestions</div>
        <div class="panel-count" id="pendingCount">0</div>
      </div>
      <table class="tbl">
        <thead><tr><th>Charity</th><th>Details</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="suggestionsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHARITIES TAB -->
  <div id="tab-charities" style="display:none;">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Published Charities</div>
        <div class="panel-count" id="charitiesCount">0</div>
      </div>
      <table class="tbl">
        <thead><tr><th>Name</th><th>Category</th><th>Location</th><th>Featured</th><th>Donation Link</th><th>Actions</th></tr></thead>
        <tbody id="charitiesBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SLIDE-OUT PANEL (shared for all edit/publish forms) -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slidePanel">
  <div class="sp-header">
    <div>
      <div class="sp-title" id="spTitle">Edit Charity</div>
      <div class="sp-subtitle" id="spSubtitle"></div>
    </div>
    <button class="sp-close" onclick="closePanel()">&times;</button>
  </div>
  <div class="sp-body" id="spBody"></div>
  <div class="sp-footer" id="spFooter"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA='https://psrtcjaxfeutecirypwd.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzcnRjamF4ZmV1dGVjaXJ5cHdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTcxMDIsImV4cCI6MjA4OTUzMzEwMn0.4aJK0277vZudaRtvmCpEhfWhHkbrXyHIc_2f8DgqZkQ';
// Use authenticated session token for admin operations (falls back to anon for reads)
function getHeaders(){
  const token=authSession?authSession.access_token:KEY;
  return{'apikey':KEY,'Authorization':`Bearer ${token}`,'Content-Type':'application/json'};
}

let suggestions=[],charities=[],categories=[];
let currentPanelId=null, currentPanelType=null;

// Sanitize strings to prevent XSS
function esc(str){if(!str)return '';const d=document.createElement('div');d.textContent=str;return d.innerHTML;}

async function load(){
  const[sr,cr,catr]=await Promise.all([
    fetch(`${SUPA}/rest/v1/charity_suggestions?order=created_at.desc`,{headers:getHeaders()}),
    fetch(`${SUPA}/rest/v1/charities?order=name.asc`,{headers:getHeaders()}),
    fetch(`${SUPA}/rest/v1/categories?order=display_order.asc`,{headers:getHeaders()})
  ]);
  suggestions=await sr.json();
  charities=await cr.json();
  categories=await catr.json();
  renderStats();
  renderSuggestions();
  renderCharities();
}

function renderStats(){
  const pending=suggestions.filter(s=>s.status==='pending').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Charities</div><div class="stat-val blue">${charities.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending Review</div><div class="stat-val amber">${pending}</div></div>
    <div class="stat-card"><div class="stat-label">Categories</div><div class="stat-val">${categories.length}</div></div>
    <div class="stat-card"><div class="stat-label">Featured</div><div class="stat-val green">${charities.filter(c=>c.is_featured).length}</div></div>
  `;
}

function renderSuggestions(){
  const body=document.getElementById('suggestionsBody');
  const pending=suggestions.filter(s=>s.status==='pending');
  document.getElementById('pendingCount').textContent=pending.length;
  if(!suggestions.length){body.innerHTML='<tr class="empty-row"><td colspan="5">No suggestions yet</td></tr>';return;}
  body.innerHTML=suggestions.map(s=>{
    const d=new Date(s.created_at);
    const date=d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const statusCls=s.status==='pending'?'status-pending':s.status==='approved'?'status-approved':'status-rejected';
    return`<tr>
      <td>
        <div class="cell-name">${esc(s.charity_name)}</div>
        ${s.website_url?`<a href="${esc(s.website_url)}" target="_blank" rel="noopener" class="cell-url">${esc(s.website_url)}</a>`:''}
        ${s.submitter_email?`<div class="cell-email">by ${esc(s.submitter_name||'Anonymous')} &lt;${esc(s.submitter_email)}&gt;</div>`:''}
      </td>
      <td>
        <div class="cell-desc">${esc(s.description||'No description')}</div>
        ${s.category?`<div style="margin-top:4px;font-size:11px;color:var(--blue);font-weight:600;">${esc(s.category)}</div>`:''}
      </td>
      <td class="cell-date">${date}</td>
      <td><span class="status ${statusCls}">${esc(s.status)}</span></td>
      <td>
        <div class="actions">
          ${s.status==='pending'?`
            <button class="btn-sm btn-edit-sub" onclick="openEditSubPanel('${s.id}')">Edit</button>
            <button class="btn-sm btn-publish" onclick="openPublishPanel('${s.id}')">Publish</button>
            <button class="btn-sm btn-reject" onclick="rejectSuggestion('${s.id}')">Reject</button>
          `:`<span style="font-size:12px;color:var(--ink-40);">—</span>`}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderCharities(){
  const body=document.getElementById('charitiesBody');
  document.getElementById('charitiesCount').textContent=charities.length;
  body.innerHTML=charities.map(c=>{
    const cat=categories.find(ct=>ct.id===c.category_id);
    return`<tr>
      <td><div class="cell-name">${esc(c.name)}</div>${c.is_featured?'<span class="status status-approved" style="margin-top:4px;">Featured</span>':''}</td>
      <td>${cat?`${esc(cat.icon)} ${esc(cat.name)}`:'-'}</td>
      <td class="cell-date">${esc(c.location||'-')}</td>
      <td><input type="checkbox" ${c.is_featured?'checked':''} onchange="toggleFeatured('${c.id}',this.checked)" style="width:18px;height:18px;accent-color:var(--green);cursor:pointer;"></td>
      <td><a href="${esc(c.donation_url)}" target="_blank" rel="noopener" class="cell-url">${esc((c.donation_url||'').replace('https://','').slice(0,35))}...</a></td>
      <td>
        <div class="actions">
          <button class="btn-sm btn-edit" onclick="openEditCharityPanel('${c.id}')">Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteCharity('${c.id}','${esc(c.name).replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </td>

/* ===== SLIDE PANEL LOGIC ===== */

function openPanel(){
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('slidePanel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('slidePanel').classList.remove('open');
  document.body.style.overflow='';
  currentPanelId=null; currentPanelType=null;
}

// Close on Escape key
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

function catOptions(selectedId){
  return categories.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${esc(c.name)}</option>`).join('');
}
function catOptionsByName(selectedName){
  return `<option value="">—</option>`+categories.map(c=>`<option value="${esc(c.name)}" ${selectedName===c.name?'selected':''}>${esc(c.name)}</option>`).join('');
}

async function doPublish(){
  const id=currentPanelId;
  const name=document.getElementById('sp-name').value;
  const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  const data={
    name,
    slug: slug+'-'+Date.now().toString(36),
    description: document.getElementById('sp-desc').value||name,
    short_description: document.getElementById('sp-short').value||null,
    category_id: parseInt(document.getElementById('sp-cat').value),
    website_url: document.getElementById('sp-web').value||null,
    donation_url: document.getElementById('sp-don').value||document.getElementById('sp-web').value||'#',
    location: document.getElementById('sp-loc').value||null,
    is_verified: false,
    name_he: document.getElementById('sp-name-he').value||null,
    short_description_he: document.getElementById('sp-short-he').value||null,
    description_he: document.getElementById('sp-desc-he').value||null
  };

  const r1=await fetch(`${SUPA}/rest/v1/charities`,{method:'POST',headers:{...getHeaders(),'Prefer':'return=minimal'},body:JSON.stringify(data)});
  const r2=await fetch(`${SUPA}/rest/v1/charity_suggestions?id=eq.${id}`,{method:'PATCH',headers:{...getHeaders(),'Prefer':'return=minimal'},body:JSON.stringify({status:'approved'})});

  if(r1.ok&&r2.ok){closePanel();toast('Published! Charity is now live.');load();}
  else toast('Error publishing. Check the data.');
}

/* --- OTHER ACTIONS (unchanged logic) --- */

async function rejectSuggestion(id){
  await fetch(`${SUPA}/rest/v1/charity_suggestions?id=eq.${id}`,{method:'PATCH',headers:{...getHeaders(),'Prefer':'return=minimal'},body:JSON.stringify({status:'rejected'})});
  toast('Suggestion rejected.');
  load();
}

async function deleteCharity(id,name){
  if(!confirm('Are you sure you want to delete "'+name+'" from the directory? This cannot be undone.'))return;
  const r=await fetch(`${SUPA}/rest/v1/charities?id=eq.${id}`,{method:'DELETE',headers:{...getHeaders(),'Prefer':'return=minimal'}});
  if(r.ok){toast('Charity deleted.');load();}
  else toast('Error deleting charity.');
}

async function toggleFeatured(id,checked){
  const r=await fetch(`${SUPA}/rest/v1/charities?id=eq.${id}`,{method:'PATCH',headers:{...getHeaders(),'Prefer':'return=minimal'},body:JSON.stringify({is_featured:checked})});
  if(r.ok){toast(checked?'Charity featured!':'Charity unfeatured.');load();}
  else toast('Error updating featured status.');
}

function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{t.classList.toggle('active',i===(tab==='suggestions'?0:1));});
  document.getElementById('tab-suggestions').style.display=tab==='suggestions'?'':'none';
  document.getElementById('tab-charities').style.display=tab==='charities'?'':'none';
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

load();
